name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Lint with flake8 (PEP 8 compliance)
        run: |
          flake8 src app.py main.py dataset/generate_dataset.py notebooks/eda.py --max-line-length=100 --extend-ignore=E203,W503

      - name: Generate dataset (needed for tests)
        run: python dataset/generate_dataset.py

      - name: Run unit tests
        run: pytest tests/ -v --tb=short

  build-check:
    runs-on: ubuntu-latest
    needs: lint-and-test

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run full pipeline end-to-end (smoke test)
        run: python main.py
